# Minimal permission profile shipped into the sandbox so codex there gets the
# same .env / secret-file deny rules as the host. The host's full config.toml
# (model pin, plugins, marketplaces, trust state) is deliberately NOT shipped -
# that is machine state. This file carries only the portable filesystem policy.
# Verify on first codex sandbox use that codex accepts this partial config.
default_permissions = "personal"

[permissions.personal.filesystem]
glob_scan_max_depth = 8
":minimal" = "read"
":root" = "read"
":tmpdir" = "write"
":slash_tmp" = "write"
"~/.ssh" = "deny"
"~/.aws" = "deny"
"~/.netrc" = "deny"
"~/.config/gh/hosts.yml" = "deny"

[permissions.personal.filesystem.":workspace_roots"]
"." = "write"
".env" = "deny"
".env.*" = "deny"
"**/.env" = "deny"
"**/.env.*" = "deny"
